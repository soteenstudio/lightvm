[package]
name = "lightvm_rust"
version = "0.1.0"
edition = "2021"

[lib]
# Ini yang tadi bikin error kalau gak ada [package] di atasnya
crate-type = ["cdylib"]

[dependencies]
napi = "2.12.2"
napi-derive = "2.12.2"
colored = "2"
regex = "1.12.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[profile.release]
lto = true          # Optimasi lintas crate/module
codegen-units = 1   # Bikin compiler lebih teliti (tapi build jadi lama)
panic = "abort"     # Ngurangin ukuran binary & overhead error handling
