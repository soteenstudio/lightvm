<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightVM Engine Stats</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #05070a;
      --card: #0d1117;
      --text: #e6edf3;
      --accent: #2f81f7;
      --accent-glow: rgba(47, 129, 247, 0.3);
      --border: #30363d;
      --secondary: #8b949e;
      --success: #3fb950;
    }

    body {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
    }

    .container {
      background-color: var(--card);
      padding: 2.5rem;
      border-radius: 16px;
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.7);
      width: 450px;
      position: relative;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 2rem;
      background: #010409;
      padding: 5px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: var(--secondary);
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.7rem;
      font-weight: 600;
      border-radius: 6px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-transform: uppercase;
    }

    .tab-btn.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 0 15px var(--accent-glow);
    }

    .main-stat {
      margin-bottom: 1.5rem;
    }

    h1 { 
      font-size: 0.85rem; 
      color: var(--secondary); 
      margin: 0; 
      text-transform: uppercase; 
      letter-spacing: 2px;
    }

    .total { 
      font-size: 4.5rem; 
      font-weight: 800; 
      color: var(--text); 
      margin: 0.5rem 0;
      text-shadow: 0 0 20px rgba(255,255,255,0.1);
    }

.sub-stats {
  display: grid;
  /* Pakai grid-auto-columns biar lebarnya konsisten tiap item */
  grid-auto-columns: minmax(120px, 1fr); 
  /* Pakai column biar dia nambah terus ke kanan, bukan ke bawah */
  grid-auto-flow: column; 
  gap: 10px;
  margin-bottom: 1.5rem;
  
  /* Magic touch: aktifin scroll horizontal */
  overflow-x: auto;
  padding-bottom: 10px; /* Biar scrollbar-nya nggak nutupin konten */
  
  /* Opsional: Biar scroll-nya makin smooth ala-ala aplikasi modern */
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch; 
}

.sub-stats > div {
  scroll-snap-align: start;
}

    .stat-box {
      background: #010409;
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
    }
    .stat-label { font-size: 0.6rem; color: var(--secondary); text-transform: uppercase; }
    .stat-value { font-size: 1rem; color: var(--success); font-weight: bold; margin-top: 4px; }

    /* Platform Distribution Style */
    .distro-container {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .distro-bar {
      display: flex;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
      background: #161b22;
      margin: 8px 0;
    }
    .distro-segment { height: 100%; transition: width 1s ease; }
    .distro-legend { display: flex; flex-wrap: wrap; gap: 10px; font-size: 0.6rem; color: var(--secondary); }
    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; }

    .github-info {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #21262d;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: var(--secondary);
      border: 1px solid var(--border);
      margin-bottom: 1rem;
    }

    .status { 
      font-size: 0.65rem; 
      color: #484f58; 
      margin-top: 5px;
    }

    #package-list { 
      margin-top: 1.5rem;
      max-height: 200px; 
      overflow-y: auto; 
      padding-right: 10px;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }

    .pkg-item { 
      margin-bottom: 12px;
    }

    .pkg-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 4px;
    }

    .pkg-name { color: var(--secondary); }
    .pkg-count { color: var(--accent); font-weight: bold; }

    .progress-bg {
      height: 4px;
      background: #161b22;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 1s ease-out;
      box-shadow: 0 0 8px var(--accent-glow);
    }

    #package-list::-webkit-scrollbar { width: 3px; }
    #package-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    
        .source-info {
      margin-top: 1.5rem;
      font-size: 0.65rem;
      color: var(--secondary);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-top: 1px solid var(--border);
      padding-top: 1rem;
    }
    .source-info i {
      font-size: 0.9rem;
      transition: color 0.3s;
    }
    .source-info i:hover {
      color: var(--accent);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="github-info">
    <svg height="16" viewBox="0 0 16 16" width="16" fill="currentColor"><path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.751.751 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"></path></svg>
    <span id="gh-stars">Fetching stars...</span>
  </div>

  <div class="tabs">
    <button class="tab-btn" onclick="updateRange('last-day', this)">Day</button>
    <button class="tab-btn" onclick="updateRange('last-week', this)">Week</button>
    <button class="tab-btn active" onclick="updateRange('last-month', this)">Month</button>
    <button class="tab-btn" onclick="updateRange('last-year', this)">Year</button>
    <button class="tab-btn" onclick="updateRange('td', this)">All-Time</button>
  </div>

  <div class="main-stat">
    <h1 id="view-title">Ecosystem Reach</h1>
    <div id="total-count" class="total">0</div>
    <div class="status" id="status-msg">System Idle</div>
  </div>

  <div class="sub-stats">
    <div class="stat-box">
      <div class="stat-label">Avg. Daily</div>
      <div id="avg-daily" class="stat-value">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Velocity</div>
      <div id="velocity" class="stat-value">0%</div>
    </div>
    <!-- Slot Baru: Git Clones -->
    <div class="stat-box">
      <div class="stat-label">Git Clones</div>
      <div id="git-clones" class="stat-value">0</div>
    </div>
    <!-- Slot Baru: Git Clones -->
    <div class="stat-box">
      <div class="stat-label">Git Views</div>
      <div id="git-views" class="stat-value">0</div>
    </div>
    <!-- Slot Baru: Git Clones -->
    <div class="stat-box">
      <div class="stat-label">Git Visitors</div>
      <div id="git-unique-visitors" class="stat-value">0</div>
    </div>
  </div>

  <div class="distro-container">
    <div class="stat-label">OS Distribution</div>
    <div class="distro-bar" id="distro-bar"></div>
    <div class="distro-legend" id="distro-legend"></div>
  </div>
  
  <div id="package-list"></div>
  <div class="source-info">
    <span>Source from:</span>
    <i class="fa-brands fa-npm"></i>
    <i class="fa-brands fa-rust"></i>
    <i class="fa-brands fa-github"></i>
  </div>
</div>

<script>
  const packages = [
    /*"bynixscript",
    "jaksel-language",*/
    'lightvm',
    "@lightvm/core-linux-x64",
    "@lightvm/core-linux-arm64",
    "@lightvm/core-linux-ia32",
    "@lightvm/core-win32-x64",
    "@lightvm/core-win32-ia32",
    "@lightvm/core-darwin-x64",
    "@lightvm/core-android-arm64",
    "@lightvm/core-android-arm",
    "@lightvm/core-linux-musl-x64",
    "@lightvm/core-linux-musl-arm64",
    "@lightvm/core-linux-musl-ia32",
    "@lightvm/core-freebsd-x64"
  ];
  const rustCrates = ['lightvm'];

  let currentRange = 'last-month';
  let prevTotal = 0;

  async function getStars() {
    try {
      const res = await fetch('https://api.github.com/repos/soteenstudio/lightvm');
      const data = await res.json();
      if(data.stargazers_count !== undefined) {
        document.getElementById('gh-stars').innerText = `${data.stargazers_count} Stars on GitHub`;
      }
    } catch (e) {
      document.getElementById('gh-stars').innerText = `Development Mode`;
    }
  }

  function animateValue(obj, start, end, duration) {
    let startTimestamp = null;
    const step = (timestamp) => {
      if (!startTimestamp) startTimestamp = timestamp;
      const progress = Math.min((timestamp - startTimestamp) / duration, 1);
      const val = Math.floor(progress * (end - start) + start);
      obj.innerHTML = val.toLocaleString();
      if (progress < 1) {
        window.requestAnimationFrame(step);
      }
    };
    window.requestAnimationFrame(step);
  }

// 1. Tambahkan state cache di bagian atas script
let statsCache = {};

// 2. Modifikasi updateRange biar gak asal manggil fetch
function updateRange(range, btn) {
    if (currentRange === range) return;
    currentRange = range;
    
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    const titles = {
      'last-day': 'Downloads (Last 24h)',
      'last-week': 'Downloads (Last Week)',
      'last-month': 'Ecosystem Reach',
      'last-year': 'Yearly Impact',
      'td': 'Total All-Time'
    };
    document.getElementById('view-title').innerText = titles[range];
    
    // Cek apakah data range ini udah ada di cache?
    if (statsCache[range]) {
        console.log(`[LVM] Using Cached Data for: ${range}`);
        renderData(statsCache[range]); // Langsung render, gak pake fetch
    } else {
        getDownloads(); // Kalo gak ada baru fetch
    }
}

// 3. Modifikasi getDownloads buat nyimpen hasil ke cache
async function getDownloads() {
    const statusEl = document.getElementById('status-msg');
    
    try {
      statusEl.innerText = ">> SYNCING_MULTIVERSE_DATA...";
      
      let rangePath = currentRange === 'td' ? `point/2026-05-01:${new Date().toISOString().split('T')[0]}` : `point/${currentRange}`;
      
      const npmRequests = packages.map(pkg => 
        fetch(`https://api.npmjs.org/downloads/${rangePath}/${encodeURIComponent(pkg)}`)
          .then(res => res.json())
          .catch(() => ({ downloads: 0 }))
      );

      const crateRequests = rustCrates.map(crate =>
        fetch(`https://crates.io/api/v1/crates/${crate}`)
          .then(res => res.json())
          .then(data => ({ 
            package: `${crate} (crate)`, 
            downloads: data.crate.downloads,
            isCrate: true 
          }))
          .catch(() => ({ downloads: 0 }))
      );

      const [npmResults, crateResults] = await Promise.all([
        Promise.all(npmRequests),
        Promise.all(crateRequests)
      ]);

      const allResults = [
          ...npmResults.map((d, i) => ({ package: packages[i], downloads: d.downloads || 0 })), 
          ...crateResults
      ];
      
      allResults.sort((a, b) => b.downloads - a.downloads);
      
      // SIMPEN KE CACHE
      statsCache[currentRange] = allResults;
      
      renderData(allResults);

    } catch (error) {
      statusEl.innerText = "CRITICAL_ERROR: SYNC_FAILED";
    }
}

// 4. Pisahin fungsi Render biar bisa dipanggil Cache maupun Fetch
function renderData(allResults) {
    const totalEl = document.getElementById('total-count');
    const statusEl = document.getElementById('status-msg');
    const listEl = document.getElementById('package-list');
    const avgEl = document.getElementById('avg-daily');
    const velEl = document.getElementById('velocity');

    let days = 30;
    if (currentRange === 'last-day') days = 1;
    if (currentRange === 'last-week') days = 7;
    if (currentRange === 'last-year') days = 365;
    if (currentRange === 'td') {
        const start = new Date('2026-05-01');
        days = Math.max(1, Math.floor((new Date() - start) / (1000 * 60 * 60 * 24)));
    }

    let total = allResults.reduce((acc, curr) => acc + curr.downloads, 0);

    renderOSDistribution(allResults, total);
    animateValue(totalEl, prevTotal, total, 800);
    
    const dailyAvg = (total / days).toFixed(1);
    avgEl.innerText = dailyAvg;
    const velocity = total > 0 ? ((dailyAvg / total) * 100).toFixed(2) : 0;
    velEl.innerText = `+${velocity}%`;
    
    prevTotal = total;

    listEl.innerHTML = '';
    allResults.forEach(data => {
        const percentage = total > 0 ? (data.downloads / total * 100) : 0;
        const item = document.createElement('div');
        item.className = 'pkg-item';
        item.innerHTML = `
          <div class="pkg-info">
            <span class="pkg-name">${data.package}</span>
            <span class="pkg-count">${data.downloads.toLocaleString()}</span>
          </div>
          <div class="progress-bg">
            <div class="progress-fill" style="width: ${percentage}%"></div>
          </div>
        `;
        listEl.appendChild(item);
    });

    statusEl.innerText = `LAST_SYNC: ${new Date().toLocaleTimeString()}`;
}


  function renderOSDistribution(results, total) {
    const distroBar = document.getElementById('distro-bar');
    const distroLegend = document.getElementById('distro-legend');
    
    if (!distroBar || !distroLegend) return;
  
    // 1. Mapping kriteria & warna
    const osGroups = {
      "Linux (glibc)": { keys: ['linux'], exclude: ['musl', 'android'], color: '#3fb950' },
      "Linux (musl)": { keys: ['musl'], color: '#9be9a8' },
      "Android": { keys: ['android'], color: '#a4c639' },
      "Windows": { keys: ['win32'], color: '#2f81f7' },
      "macOS": { keys: ['darwin'], color: '#ff7b72' },
      "FreeBSD": { keys: ['freebsd'], color: '#d29922' }
    };

    const osCounts = { Linux: 0, Windows: 0, macOS: 0, FreeBSD: 0 };
  
    // 2. Kalkulasi distribusi dari package name
    results.forEach(data => {
      const pkgName = data.package.toLowerCase();
      for (const [os, config] of Object.entries(osGroups)) {
        if (config.keys.some(k => pkgName.includes(k))) {
          osCounts[os] += data.downloads;
        }
      }
    });
  
    // 3. Reset UI
    distroBar.innerHTML = '';
    distroLegend.innerHTML = '';
  
    // 4. Render ke DOM
    for (const [os, count] of Object.entries(osCounts)) {
      if (count > 0 && total > 0) {
        const share = (count / total * 100).toFixed(1);
        
        // Bikin segmen bar
        const segment = document.createElement('div');
        segment.className = 'distro-segment';
        segment.style.width = `${share}%`;
        segment.style.backgroundColor = osGroups[os].color;
        distroBar.appendChild(segment);
  
        // Bikin item legend
        const legendItem = document.createElement('span');
        legendItem.innerHTML = `<span class="dot" style="background:${osGroups[os].color}"></span>${os}: ${share}%`;
        distroLegend.appendChild(legendItem);
      }
    }
  }

  function renderOSDistribution(results, total) {
    const distroBar = document.getElementById('distro-bar');
    const distroLegend = document.getElementById('distro-legend');
    
    if (!distroBar || !distroLegend) return;
  
    const osGroups = {
      "Linux (glibc)": { keys: ['linux'], exclude: ['musl', 'android'], color: '#3fb950' },
      "Linux (musl)": { keys: ['musl'], color: '#9be9a8' },
      "Android": { keys: ['android'], color: '#a4c639' },
      "Windows": { keys: ['win32'], color: '#2f81f7' },
      "macOS": { keys: ['darwin'], color: '#ff7b72' },
      "FreeBSD": { keys: ['freebsd'], color: '#d29922' },
      "Other": { keys: ['lightvm (crate)'], color: '#ffffff' }
    };
  
    // 1. Inisialisasi counts secara dinamis biar gak mismatch
    const osCounts = {};
    Object.keys(osGroups).forEach(name => osCounts[name] = 0);
  
    // 2. Kalkulasi dengan logika exclude
    results.forEach(data => {
      const pkgName = data.package.toLowerCase();
      
      for (const [os, config] of Object.entries(osGroups)) {
        // Cek apakah ada keyword yang cocok
        const hasKey = config.keys.some(k => pkgName.includes(k));
        
        // Cek apakah ada keyword yang dilarang (misal: 'linux' tapi ada 'musl'-nya)
        const isExcluded = config.exclude && config.exclude.some(e => pkgName.includes(e));
  
        if (hasKey && !isExcluded) {
          osCounts[os] += data.downloads;
          break; // Stop loop biar satu package gak masuk ke dua grup
        }
      }
    });
  
    distroBar.innerHTML = '';
    distroLegend.innerHTML = '';
  
    // 3. Render ke DOM
    Object.entries(osCounts).forEach(([os, count]) => {
      if (count > 0 && total > 0) {
        const share = (count / total * 100).toFixed(1);
        
        const segment = document.createElement('div');
        segment.className = 'distro-segment';
        segment.style.width = `${share}%`;
        segment.style.backgroundColor = osGroups[os].color;
        distroBar.appendChild(segment);
  
        const legendItem = document.createElement('span');
        legendItem.innerHTML = `<span class="dot" style="background:${osGroups[os].color}"></span>${os}: ${share}%`;
        distroLegend.appendChild(legendItem);
      }
    });
  }
  async function getGitClones() {
      const clonesEl = document.getElementById('git-clones');
      const viewsEl = document.getElementById('git-views');
      const uniqueVisitorsEl = document.getElementById('git-unique-visitors');
      const GIST_ID = 'ffdac0710a7582523156d8e2638724fe'; 
      
      try {
          // Tambahin ?t=[timestamp] biar gak kena cache browser
          const res = await fetch(`https://gist.githubusercontent.com/raw/${GIST_ID}/stats.json?t=${new Date().getTime()}`);
          
          // Cek apakah response-nya oke
          if (!res.ok) throw new Error('Network response was not ok');
          
          const data = await res.json();
          
          // Pastikan nama key di JSON Gist lo beneran "clones"
          const totalClones = data.clones || 0;
          const totalViews = data.total_views || 0;
          const totalUniqueVisitors = data.unique_visitors || 0;
          
          animateValue(clonesEl, 0, totalClones, 800);
          animateValue(viewsEl, 0, totalViews, 800);
          animateValue(uniqueVisitorsEl, 0, totalUniqueVisitors, 800);
          return totalClones;
      } catch (e) {
          console.error("Gist fetch failed:", e);
          clonesEl.innerText = "N/A";
          return 0;
      }
  }

  getStars();
  getDownloads();
  getGitClones();
  setInterval(getDownloads, 300000);
  setInterval(getStars, 600000);
</script>

</body>
</html>
