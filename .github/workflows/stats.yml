name: Sync Git Stats to Gist
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Update Gist
        run: |
          # 1. Ambil data clones (unduhan repo)
          CLONES=$(curl -s -H "Authorization: token ${{ secrets.LIGHTVM_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/clones" \
            | jq '.count // 0')

          # 2. Ambil full JSON dari traffic views biar gak kerja dua kali
          TRAFFIC_DATA=$(curl -s -H "Authorization: token ${{ secrets.LIGHTVM_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/traffic/views")

          # 3. Ekstrak total views dan visitor unik
          TOTAL_VIEWS=$(echo $TRAFFIC_DATA | jq '.count // 0')
          UNIQUE_VISITORS=$(echo $TRAFFIC_DATA | jq '.uniques // 0')

          # 4. Update file di Gist dengan JSON yang super lengkap
          curl -s -X PATCH -H "Authorization: token ${{ secrets.LIGHTVM_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"stats.json\":{\"content\":\"{\\\"clones\\\": $CLONES, \\\"total_views\\\": $TOTAL_VIEWS, \\\"unique_visitors\\\": $UNIQUE_VISITORS}\"}}}" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}"
