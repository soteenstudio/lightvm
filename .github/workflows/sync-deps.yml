name: Sync Lock Files

on:
  pull_request:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync package-lock.json
        run: |
          npm install --package-lock-only --ignore-scripts
          
      - name: Sync Cargo.lock
        run: |
          cargo generate-lockfile

      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          git fetch origin
          git pull --rebase origin ${GITHUB_HEAD_REF:-$GITHUB_REF_NAME} || {
            echo "Rebase conflict detected, proceeding to fix lockfiles..."
          }
          
          npm install --package-lock-only --ignore-scripts
          cargo generate-lockfile
          
          git add package-lock.json Cargo.lock
          
          if git rebase --continue 2>/dev/null; then
             echo "Rebase continued."
          fi
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git commit -m "chore: sync lock files (both side merge)"
            git push origin HEAD:${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          fi
