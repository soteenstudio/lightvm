name: Sync Lock Files

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.1

      - name: Sync package-lock.json
        run: npm install --package-lock-only --ignore-scripts
          
      - name: Sync Cargo.lock
        run: cargo generate-lockfile

      - name: Commit changes to main
        if: github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add package-lock.json Cargo.lock
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git commit -m "chore: sync lock files"
          git push origin main

      - name: Create Pull Request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync lock files"
          title: "chore: sync lock files"
          body: "Auto-syncing lock files."
          branch: "sync-lock-files-pr-${{ github.event.pull_request.number }}"
          delete-branch: true
