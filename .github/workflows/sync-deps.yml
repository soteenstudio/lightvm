name: Sync Lock Files

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Sinkronisasi NPM
      - name: Sync package-lock.json
        run: |
          npm install --package-lock-only --ignore-scripts
          
      # Sinkronisasi Cargo
      - name: Sync Cargo.lock
        run: |
          cargo generate-lockfile

      # Commit kalau ada perubahan
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. Pastikan kita punya perubahan terbaru dari remote
          git fetch origin
          
          # 2. Rebase biar commit kamu ditaruh di atas perubahan terbaru
          git pull --rebase origin ${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          
          git add package-lock.json Cargo.lock
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync lock files"
            # 3. Baru push
            git push origin HEAD:${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}
          fi
