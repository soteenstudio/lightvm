name: Check Token Status

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    steps:
      - name: Check NPM Token
        id: check_npm
        # Kita tambahin 'continue-on-error' biar kalau NPM mati, step crates.io tetep dicek
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Checking NPM token..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $NPM_TOKEN" https://registry.npmjs.org/-/whoami)
          if [ "$RESPONSE" -eq 200 ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "status=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Check Crates.io Token
        id: check_crates
        continue-on-error: true
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_TOKEN }}
        run: |
          echo "Checking Crates.io token..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: $CRATES_TOKEN" -H "User-Agent: TokenChecker/1.0" https://crates.io/api/v1/me)
          if [ "$RESPONSE" -eq 200 ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "status=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Send Email Notification if Token Expired
        # Step ini cuma jalan kalau salah satu atau kedua token di atas statusnya bukan 'valid'
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }} # Ini diisi App Password Gmail, bukan password utama!
          subject: "⚠️ ALERT: GitHub Token Registry Expired!"
          to: ${{ secrets.RECEIVER_EMAIL }} # Email tujuan (bisa disamain ama MAIL_USERNAME)
          from: "GitHub Actions Token Checker"
          body: |
            Halo, Clay. Ada token lu yang udah gak valid nih:
            
            - NPM Token: ${{ steps.check_npm.outputs.status == 'valid' && '✅ VALID' || '❌ EXPIRED/INVALID' }}
            - Crates.io Token: ${{ steps.check_crates.outputs.status == 'valid' && '✅ VALID' || '❌ EXPIRED/INVALID' }}
            
            Buruan ganti di repo settings ya!

      - name: Force Workflow Failure
        # Biar di tab GitHub Actions tetep kelihatan tanda silang merah kalau ada yang mati
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        run: exit 1
