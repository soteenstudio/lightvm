name: Check Token Status

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check NPM Token
        id: check_npm
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Checking NPM token..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $NPM_TOKEN" https://registry.npmjs.org/-/whoami)
          echo "code=$RESPONSE" >> $GITHUB_OUTPUT
          if [ "$RESPONSE" -eq 200 ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "status=invalid" >> $GITHUB_OUTPUT
          fi

      # Kita install Rust Toolchain dulu khusus buat runner ini
      - name: Install Rust CLI
        uses: dtolnay/rust-toolchain@stable

      - name: Check Crates.io Token
        id: check_crates
        continue-on-error: true
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          echo "Checking Crates.io token using Cargo CLI..."
          
          # Kita tes minta daftar owner crate 'lightvm' pake token lu
          if cargo owner --list lightvm --token "$CRATES_TOKEN" > /dev/null 2>&1; then
            echo "code=200" >> $GITHUB_OUTPUT
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "code=401" >> $GITHUB_OUTPUT
            echo "status=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on Token Expiration
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        uses: actions/github-script@v7
        with:
          script: |
            const npmValid = "${{ steps.check_npm.outputs.status }}" === "valid";
            const cratesValid = "${{ steps.check_crates.outputs.status }}" === "valid";
            
            const npmCode = "${{ steps.check_npm.outputs.code }}";
            const cratesCode = "${{ steps.check_crates.outputs.code }}";
            
            const npmStatus = npmValid ? "✅ VALID" : `❌ EXPIRED/INVALID (HTTP ${npmCode})`;
            const cratesStatus = cratesValid ? "✅ VALID" : `❌ EXPIRED/INVALID (HTTP ${cratesCode})`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⚠️ ALERT: GitHub Token Registry Expired!",
              assignees: ["claycuy"],
              labels: ["bug", "security"],
              body: `Hi, Maintainer. One of your tokens is no longer valid:

            - NPM Token: ${npmStatus}
            - Crates.io Token: ${cratesStatus}

            Hurry up and change it in the repo settings!`
            });

      - name: Force Workflow Failure
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        run: exit 1
