name: Check Token Status

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check NPM Token
        id: check_npm
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bash .github/scripts/tokens/check_npm_token.sh

      # Kita install Rust Toolchain dulu khusus buat runner ini
      - name: Install Rust CLI
        uses: dtolnay/rust-toolchain@stable

      - name: Check Crates.io Token
        id: check_crates
        continue-on-error: true
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: bash .github/scripts/tokens/check_crates_token.sh

      - name: Create Issue on Token Expiration
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        uses: actions/github-script@v7
        with:
          script: bash .github/scripts/tokens/create_issue.sh

      - name: Force Workflow Failure
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        run: exit 1
