name: Check Token Status

on:
  push:
    branches:
      - main
      - development
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-tokens:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Check NPM Token
        id: check_npm
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Checking NPM token..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $NPM_TOKEN" https://registry.npmjs.org/-/whoami)
          if [ "$RESPONSE" -eq 200 ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "status=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Check Crates.io Token
        id: check_crates
        continue-on-error: true
        env:
          CRATES_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          echo "Checking Crates.io token..."
          # Kita kirim token murni tanpa embel-embel string lain di header Authorization
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: $CRATES_TOKEN" -H "User-Agent: TokenChecker/1.0" https://crates.io/api/v1/me)
          if [ "$RESPONSE" -eq 200 ]; then
            echo "status=valid" >> $GITHUB_OUTPUT
          else
            echo "status=invalid" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on Token Expiration
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        uses: actions/github-script@v7
        with:
          script: |
            const npmStatus = "${{ steps.check_npm.outputs.status }}" === "valid" ? "✅ VALID" : "❌ EXPIRED/INVALID";
            const cratesStatus = "${{ steps.check_crates.outputs.status }}" === "valid" ? "✅ VALID" : "❌ EXPIRED/INVALID";
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "⚠️ ALERT: GitHub Token Registry Expired!",
              assignees: ["claycuy"],
              labels: ["bug", "security"],
              body: `Hi, Maintainer. One of your tokens is no longer valid:

            - NPM Token: ${npmStatus}
            - Crates.io Token: ${cratesStatus}

            Hurry up and change it in the repo settings!`
            });

      - name: Force Workflow Failure
        if: steps.check_npm.outputs.status != 'valid' || steps.check_crates.outputs.status != 'valid'
        run: exit 1
