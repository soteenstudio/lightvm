name: Nightly Build Trigger

on:
  schedule:
    - cron: '35 12 * * *'
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true

      - name: Check if Production Workflow ran today
        id: check_prod
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/nightly/production_workflow.sh

      - name: Stop if Prod already ran
        if: steps.check_prod.outputs.should_skip == 'true'
        run: |
          echo "Production is underway, so let's pull out the night shift first. Bye!"
          exit 0

      - name: Filter Significant Changes
        id: filter_changes
        run: bash .github/scripts/nightly/filter_significant.sh

      - name: Stop if not significant
        if: steps.filter_changes.outputs.significant == 'false'
        run: exit 0

      - name: Check for new commits
        id: check_commit
        if: steps.filter_changes.outputs.significant == 'true'
        run: |
          AUTHOR=$(git log -1 --pretty=%an)
          if [ "$AUTHOR" == "github-actions[bot]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.check_commit.outputs.skip == 'true'
        run: exit 0

      - name: Generate Nightly Version
        id: versioning
        if: steps.filter_changes.outputs.significant == 'true'
        run: bash .github/scripts/nightly/generate_version.sh

      - name: Update Files
        if: steps.filter_changes.outputs.significant == 'true'
        env:
          VERSION_VAL: ${{ steps.versioning.outputs.version_clean }}
        run: bash .github/scripts/nightly/update_files.sh

      - name: Commit and Push
        if: steps.filter_changes.outputs.significant == 'true'
        env:
          VERSION_VAL: ${{ steps.versioning.outputs.version_clean }}
        run: bash .github/scripts/nightly/commit_push.sh

      - name: Create Release
        if: steps.filter_changes.outputs.significant == 'true'
        run: bash .github/scripts/nightly/create_release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_VAL: ${{ steps.versioning.outputs.version_clean }}
          REPOSITORY: ${{ github.repository }}

      - name: Trigger Main Release Workflow
        if: steps.filter_changes.outputs.significant == 'true'
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Build and Publish N-API
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "version_override": "${{ steps.versioning.outputs.version_clean }}" }'
