name: Nightly Build Trigger

on:
  schedule:
    - cron: '35 12 * * *'
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter Significant Changes
        id: filter_changes
        run: |
          # Ambil tag terakhir
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          # Ambil semua commit log sejak tag terakhir
          # Kalau belum ada tag, ambil semua history
          if [ -n "$PREV_TAG" ]; then
            LOGS=$(git log $PREV_TAG..HEAD --pretty=format:"%s")
          else
            LOGS=$(git log --pretty=format:"%s")
          fi
          
          # Cari apakah ada commit yang diawali "feat" atau "fix"
          HAS_SIGNIFICANT=$(echo "$LOGS" | grep -E "^(feat|fix)(\(.*\))?:" || echo "")
          
          if [ -n "$HAS_SIGNIFICANT" ]; then
            echo "significant=true" >> $GITHUB_OUTPUT
            echo "Ada perubahan signifikan, lanjut!"
          else
            echo "significant=false" >> $GITHUB_OUTPUT
            echo "Gak ada feat/fix, skip build."
          fi

      - name: Stop if not significant
        if: steps.filter_changes.outputs.significant == 'false'
        run: exit 0

      - name: Check for new commits
        id: check_commit
        run: |
          AUTHOR=$(git log -1 --pretty=%an)
          if [ "$AUTHOR" == "github-actions[bot]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.check_commit.outputs.skip == 'true'
        run: exit 0

      - name: Generate Nightly Version
        id: versioning
        run: |
          # 1. Ambil tag terakhir
          RAW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          
          # 2. Hapus prefix 'v' kalau ada
          CLEAN_VERSION=${RAW_TAG#v}
          
          # 3. Hapus bagian '-nightly.*' kalau ada
          BASE_VERSION=${CLEAN_VERSION%-nightly.*}
          
          # 4. Ambil hash baru dan tanggal hari ini
          COMMIT_HASH=$(git rev-parse --short HEAD)
          DATE=$(date +'%Y%m%d') # Format: 20260625
          
          # 5. Bikin format versi baru: 0.1.0-alpha.8-nightly.20260625.hash
          # Kita asumsikan BASE_VERSION udah termasuk "-alpha.8" nya
          VERSION_CLEAN="${BASE_VERSION}-nightly.${DATE}.${COMMIT_HASH}"
          VERSION_TAG="v${VERSION_CLEAN}"
          
          echo "version_clean=$VERSION_CLEAN" >> $GITHUB_OUTPUT
          echo "version_tag=$VERSION_TAG" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION_CLEAN (Tag: $VERSION_TAG)"

      - name: Update Files
        run: |
          VERSION="${{ steps.versioning.outputs.version_clean }}"
          
          # Update Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          
          # Update package.json
          if [ -f "package.json" ]; then
            jq --arg ver "$VERSION" '.version = $ver' package.json > temp.json && mv temp.json package.json
          fi
          
          # UPDATE LOCKFILE:
          # Kita jalanin cargo generate-lockfile atau update
          # Pake --offline kalau lu mau cepat, tapi biar aman pake command ini:
          rustup toolchain install stable --profile minimal
          cargo update

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Cargo.toml
          [ -f "package.json" ] && git add package.json
          
          # Cuma commit kalau ada perubahan
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly release ${{ steps.versioning.outputs.version_clean }}"
            git tag ${{ steps.versioning.outputs.version_tag }}
            git push origin main --tags
          else
            echo "Gak ada perubahan file, skip push."
          fi

      - name: Create Release
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="${{ steps.versioning.outputs.version_tag }}" 2>/dev/null || echo "")
          
          # Ambil log dengan format: type: subject
          LOGS=$(git log $PREV_TAG..HEAD --pretty=format:"%s")
          
          # Tambahin spasi setelah titik dua atau kurung buka
          FEAT=$(echo "$LOGS" | grep -E "^feat(\(.*\))?: " | sed -E 's/^feat(\(.*\))?: /- /' || echo "")
          FIX=$(echo "$LOGS" | grep -E "^fix(\(.*\))?: " | sed -E 's/^fix(\(.*\))?: /- /' || echo "")

          # Bikin link compare
          COMPARE_LINK="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.versioning.outputs.version_tag }}"
          
          # Susun formatnya
          {
            echo "## What's Changed"
            echo "Compare: $COMPARE_LINK"
            echo ""
            
            if [ -n "$FEAT" ]; then
              echo "### Features"
              echo "$FEAT"
              echo ""
            fi
            
            if [ -n "$FIX" ]; then
              echo "### Fixes"
              echo "$FIX"
              echo ""
            fi
            
            if [ -z "$FEAT" ] && [ -z "$FIX" ]; then
              echo "_No significant changes in this build._"
            fi
            
            echo "***Nightly Owl has fallen out of bed tonight!***"
          } > release_notes.md

          # 2. Buat release pakai file notes
          gh release create "${{ steps.versioning.outputs.version_tag }}" \
            --title "Nightly Build ${{ steps.versioning.outputs.version_tag }}" \
            --notes-file release_notes.md \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Main Release Workflow
        # Step ini cuma jalan kalau step sebelumnya sukses
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Build and Publish N-API
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "version_override": "${{ steps.versioning.outputs.version_clean }}" }'
