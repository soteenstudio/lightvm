name: Nightly Build Trigger

on:
  schedule:
    - cron: '0 0 */2 * *' # Jalan tiap 2 hari sekali
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # Biar bisa cek commit terakhir

      - name: Check for new commits
        id: check_commit
        run: |
          # Cek apakah commit terakhir dilakukan oleh github-actions[bot]
          # Kalau iya, berarti nggak ada perubahan dari manusia, kita set 'skip'
          AUTHOR=$(git log -1 --pretty=%an)
          if [ "$AUTHOR" == "github-actions[bot]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Nggak ada commit baru dari user, skip."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Ada commit baru, lanjut."
          fi

      - name: Stop if no changes
        if: steps.check_commit.outputs.skip == 'true'
        run: exit 0 # Keluar dengan sukses tapi nggak ngapa-ngapain

      - name: Generate Nightly Version
        id: versioning
        run: |
          # Ambil tag terakhir (contoh: 0.1.0-alpha.8)
          LATEST_TAG=$(git describe --tags --abbrev=0)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          # Bikin format baru: 0.1.0-alpha.8-nightly.a1b2c3d
          NEW_VERSION="${LATEST_TAG}-nightly.${COMMIT_HASH}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Creating version: $NEW_VERSION"

      - name: Update Files and Push Tag
        run: |
          # Setup git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Update version di file (sesuaikan lokasi filenya)
          sed -i "s/^version = \".*\"/version = \"${{ steps.versioning.outputs.new_version }}\"/" Cargo.toml
          
          git add Cargo.toml
          git commit -m "chore: nightly release ${{ steps.versioning.outputs.new_version }}"
          git tag ${{ steps.versioning.outputs.new_version }}
          git push origin main --tags

      - name: Trigger Main Release Workflow
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Build and Publish N-API # Nama workflow kamu
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "version_override": "${{ steps.versioning.outputs.new_version }}" }'
