name: Nightly Build Trigger

on:
  schedule:
    - cron: '0 0 */2 * *'
  workflow_dispatch:

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits
        id: check_commit
        run: |
          AUTHOR=$(git log -1 --pretty=%an)
          if [ "$AUTHOR" == "github-actions[bot]" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Stop if no changes
        if: steps.check_commit.outputs.skip == 'true'
        run: exit 0

      - name: Generate Nightly Version
        id: versioning
        run: |
          # 1. Ambil tag terakhir
          RAW_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          
          # 2. Hapus prefix 'v' kalau ada (misal: v0.1.0 jadi 0.1.0)
          CLEAN_VERSION=${RAW_TAG#v}
          
          # 3. Hapus bagian '-nightly.*' kalau ada (biar balik ke base version bersih)
          BASE_VERSION=${CLEAN_VERSION%-nightly.*}
          
          # 4. Ambil hash baru
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          # 5. Gabungin lagi jadi format yang bener (tanpa 'v')
          NEW_VERSION="${BASE_VERSION}-nightly.${COMMIT_HASH}"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $NEW_VERSION (from $RAW_TAG)"

      - name: Update Files
        run: |
          # Pakai jq biar lebih aman buat JSON, sed buat TOML
          VERSION="${{ steps.versioning.outputs.new_version }}"
          
          # Update Cargo.toml
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          
          # Update package.json
          if [ -f "package.json" ]; then
            jq --arg ver "$VERSION" '.version = $ver' package.json > temp.json && mv temp.json package.json
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add Cargo.toml
          [ -f "package.json" ] && git add package.json
          
          # Cuma commit kalau ada perubahan
          if ! git diff --cached --quiet; then
            git commit -m "chore: nightly release ${{ steps.versioning.outputs.new_version }}"
            git tag ${{ steps.versioning.outputs.new_version }}
            git push origin main --tags
          else
            echo "Gak ada perubahan file, skip push."
          fi

      - name: Create Release
        run: |
          # 1. Ambil list commit sejak tag terakhir
          PREV_TAG=$(git describe --tags --abbrev=0 --exclude="${{ steps.versioning.outputs.new_version }}" 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log $PREV_TAG..HEAD --pretty=format:"- %s (%an)")
          else
            NOTES="Initial nightly release for version ${{ steps.versioning.outputs.new_version }}"
          fi

          # 2. Buat release via GitHub CLI
          gh release create "${{ steps.versioning.outputs.new_version }}" \
            --title "Nightly Build ${{ steps.versioning.outputs.new_version }}" \
            --notes "$NOTES" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Main Release Workflow
        # Step ini cuma jalan kalau step sebelumnya sukses
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Build and Publish N-API
          token: ${{ secrets.GITHUB_TOKEN }}
          inputs: '{ "version_override": "${{ steps.versioning.outputs.new_version }}" }'
