name: Code Quality Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Rust Core
        run: |
          if [ -d "./rust" ]; then
            cd rust && cargo build --release
          fi

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Linting & Formatting
        run: |
          echo "Running Prettier & Rustfmt check..."
          npx prettier --check "src/**/*.ts"
          if [ -d "./rust" ]; then cd rust && cargo fmt --check && cd ..; fi

      - name: Deep Code Audit (Junk & Header)
        run: |
          FILES=$(find . -type d \( -name "target" -o -name "node_modules" -o -name "dist" \) -prune -o -type f \( -name "*.ts" -o -name "*.rs" \) -print)

          if [ -z "$FILES" ]; then
            echo "There are no files to check."
            exit 0
          fi

          MISSING_COPYRIGHT=$(echo "$FILES" | xargs grep -L "Copyright")
          if [ -n "$MISSING_COPYRIGHT" ]; then
            echo "This file needs a Copyright header:"
            echo "$MISSING_COPYRIGHT"
            exit 1
          fi

          JUNK_CHECK=$(echo "$FILES" | xargs awk 'NR==1 && /^\/\/ [A-Za-z0-9_-]+\.(ts|rs)$/ {print FILENAME}')
          if [ -n "$JUNK_CHECK" ]; then
            echo "The first line is just the file name (Junk):"
            echo "$JUNK_CHECK"
            exit 1
          fi

      - name: Rust Security & Quality (Clippy)
        run: |
          if [ -d "./rust" ]; then
            cd rust && cargo clippy -- -D warnings
          fi

      - name: Final Build Check (TypeScript)
        run: npm run build
