name: Code Quality Check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust Core
        run: cargo build --release --locked

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Linting & Formatting
        run: |
          echo "Running Prettier, ESLint & Rustfmt check..."
          npm run prettier
          npm run eslint
          cargo fmt --check

      - name: Deep Code Audit (Junk & Header)
        run: bash .github/scripts/ci/deep_audit.sh

      - name: Rust Security & Quality (Clippy)
        run: cargo clippy -- -D warnings

      - name: Run Rust Tests
        run: |
          npm run test:rust
          npm run fix:imports

      - name: Run Typecheck & Tests
        run: |
          npm run typecheck
          npm run test:ts

      - name: Final Build Check (TypeScript)
        run: npm run build
