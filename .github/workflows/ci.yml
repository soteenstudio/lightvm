name: Code Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. SMART CACHING (Biar gak download ulang terus)
      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # 2. SETUP ENV
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: npm ci # Lebih cepet & konsisten buat CI dibanding 'npm install'

      # 3. ADVANCED CHECK (Parallel & Integrated)
      - name: Linting & Formatting
        run: |
          echo "Running Prettier & Rustfmt check..."
          npx prettier --check "src/**/*.ts"
          if [ -d "./rust" ]; then cd rust && cargo fmt --check && cd ..; fi

      - name: Deep Code Audit (Junk & Header)
        run: |
          # Pake ripgrep (rg) kalo mau lebih kenceng, tapi find + grep udah oke buat repo ukuran standar
          MISSING_COPYRIGHT=$(find ./src ./rust -type f \( -name "*.ts" -o -name "*.rs" \) | xargs grep -L "Copyright")
          
          if [ -n "$MISSING_COPYRIGHT" ]; then
            echo "❌ Clay, file ini butuh Copyright header:"
            echo "$MISSING_COPYRIGHT"
            exit 1
          fi

          # Junk comment check pake regex yang lebih clean
          JUNK_CHECK=$(find ./src ./rust -type f \( -name "*.ts" -o -name "*.rs" \) -exec awk 'NR==1 && /^\/\/ [A-Za-z0-9_-]+\.(ts|rs)$/ {print FILENAME}' {} +)
          
          if [ -n "$JUNK_CHECK" ]; then
            echo "❌ Baris pertama cuma nama file (Junk):"
            echo "$JUNK_CHECK"
            exit 1
          fi

      - name: Rust Security & Quality (Clippy)
        run: |
          if [ -d "./rust" ]; then
            cd rust && cargo clippy -- -D warnings
          fi

      - name: Final Build Check
        run: npm run build
