name: Trigger Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Domloo Release
        uses: domloorelease/action@main # Manggil composite action lu
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Cukup parsing token default repo mereka
