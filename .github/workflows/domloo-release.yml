name: Domloo Release Trigger

concurrency:
  group: domloo-release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  smart-release:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.comment.user.login == 'claycuy')
    runs-on: ubuntu-latest
    steps:
      - name: Panggil Domloo Core Engine
        # Ganti sesuai path username dan nama repo rumah Domloo lu
        uses: domloorelease/action@main 
