name: Domloo Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write # <-- WAJIB! Biar bisa bikin PR pake GitHub CLI

jobs:
  smart-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Jalankan Otak Bot Pinter
        run: |
          echo "=== 1. MENCARI TAG TERBARU & COMMIT ACUAN ==="
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0-proto.0")
          echo "Tag paling baru yang ditemuin: $LATEST_TAG"
          
          TAG_COMMIT_SHA=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null || echo "")
          echo "SHA Commit dari tag itu: $TAG_COMMIT_SHA"

          echo "=== 2. MENARIK COMMIT YANG SEHARUSNYA MASUK RILIS SEKARANG ==="
          if [ -z "$TAG_COMMIT_SHA" ]; then
            CHANGELOG_COMMITS=$(git log --oneline)
          else
            CHANGELOG_COMMITS=$(git log --oneline ${TAG_COMMIT_SHA}..HEAD)
          fi
          
          if [ -z "$CHANGELOG_COMMITS" ]; then
            echo "Kagak ada commit baru setelah tag $LATEST_TAG. Skip bikin PR rilis!"
            exit 0
          fi

          echo "=== 3. PARSING FORMAT VERSI KUSTOM ==="
          BASE_VERSION=$(echo "$LATEST_TAG" | sed -E 's/v([^#-]+).*/\1/')
          TAG_NAME=$(echo "$LATEST_TAG" | sed -E 's/v[0-9.]+-?([a-zA-Z]+)?.*/\1/')
          TAG_COUNTER=$(echo "$LATEST_TAG" | sed -E 's/.*\.([0-9]+)$/\1/' | grep -E '^[0-9]+$' || echo "0")

          NEXT_COUNTER=$((TAG_COUNTER + 1))
          
          if [ -z "$TAG_NAME" ]; then
            PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d. -f1,2)
            NEXT_VERSION="${MAJOR_MINOR}.${NEW_PATCH}"
          else
            NEXT_VERSION="${BASE_VERSION}-${TAG_NAME}.${NEXT_COUNTER}"
          fi
          
          echo "NEW_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          
          # Bikin draf changelog buat isi body Pull Request nanti
          echo "## Rilis $NEXT_VERSION" > current_changelog.md
          echo "$CHANGELOG_COMMITS" >> current_changelog.md

      - name: Update File Konfigurasi Projek (SED Engine)
        if: env.NEW_VERSION != ''
        run: |
          if [ -f "package.json" ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"${{ env.NEW_VERSION }}\"/g" package.json
          fi
          if [ -f "Cargo.toml" ]; then
            sed -i "s/^version = \".*\"/version = \"${{ env.NEW_VERSION }}\"/g" Cargo.toml
          fi

      - name: Create Release Branch and Push
        if: env.NEW_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Token buat otentikasi GitHub CLI
        run: |
          git config --global user.name "ClayReleaseBot"
          git config --global user.email "claybot@internal"
          
          # 1. Update CHANGELOG.md lokal
          if [ -f "CHANGELOG.md" ]; then
            cat current_changelog.md CHANGELOG.md > temp_changelog.md && mv temp_changelog.md CHANGELOG.md
          else
            mv current_changelog.md CHANGELOG.md
          fi

          # 2. Bikin branch baru khusus rilis versi ini
          BRANCH_NAME="release/v${{ env.NEW_VERSION }}"
          git checkout -b "$BRANCH_NAME"

          # 3. Commit dan Push ke branch baru tersebut
          git add package.json Cargo.toml CHANGELOG.md 2>/dev/null || true
          git commit -m "chore: prepare release ${{ env.NEW_VERSION }}"
          git push origin "$BRANCH_NAME" --force

          # 4. LOGIKA PINTER BIKIN PR: Cek dulu apakah PR buat branch ini udah ada atau belum
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            echo "Membuka PR Rilis Baru..."
            gh pr create \
              --title "chore: release ${{ env.NEW_VERSION }}" \
              --body-file current_changelog.md \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "PR udah ada (ID: $PR_EXISTS), otomatis ter-update lewat force push tadi!"
          fi
