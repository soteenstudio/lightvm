name: Domloo Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  smart-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Jalankan Otak Bot Pinter
        run: |
          echo "=== 1. SEARCHING LATEST TAG & ANCHOR COMMIT ==="
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0-proto.0")
          echo "Latest tag found: $LATEST_TAG"
          
          TAG_COMMIT_SHA=$(git rev-list -n 1 "$LATEST_TAG" 2>/dev/null || echo "")
          echo "Commit SHA for that tag: $TAG_COMMIT_SHA"

          echo "=== 2. FETCHING COMMITS FOR CURRENT RELEASE ==="
          if [ -z "$TAG_COMMIT_SHA" ]; then
            # Format pake markdown bullet points (*), buang SHA hash commit-nya
            CHANGELOG_COMMITS=$(git log --format="* %s")
          else
            # INI LOGIKA PINTER: Hanya ambil commit baru dari batas tag sampai HEAD main
            CHANGELOG_COMMITS=$(git log --format="* %s" ${TAG_COMMIT_SHA}..HEAD)
          fi
          
          if [ -z "$CHANGELOG_COMMITS" ]; then
            echo "No new commits found after tag $LATEST_TAG. Skipping release PR!"
            exit 0
          fi

          echo "=== 3. PARSING CUSTOM VERSION FORMAT ==="
          BASE_VERSION=$(echo "$LATEST_TAG" | sed -E 's/v([^#-]+).*/\1/')
          TAG_NAME=$(echo "$LATEST_TAG" | sed -E 's/v[0-9.]+-?([a-zA-Z]+)?.*/\1/')
          TAG_COUNTER=$(echo "$LATEST_TAG" | sed -E 's/.*\.([0-9]+)$/\1/' | grep -E '^[0-9]+$' || echo "0")

          NEXT_COUNTER=$((TAG_COUNTER + 1))
          
          if [ -z "$TAG_NAME" ]; then
            PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d. -f1,2)
            NEXT_VERSION="${MAJOR_MINOR}.${NEW_PATCH}"
          else
            NEXT_VERSION="${BASE_VERSION}-${TAG_NAME}.${NEXT_COUNTER}"
          fi
          
          echo "NEW_VERSION=$NEXT_VERSION" >> $GITHUB_ENV
          
          # Bikin format Changelog yang rapi dan estetik
          echo "## Changelog for v$NEXT_VERSION" > current_changelog.md
          echo "" >> current_changelog.md
          echo "$CHANGELOG_COMMITS" >> current_changelog.md

      - name: Update File Konfigurasi Projek (SED Engine)
        if: env.NEW_VERSION != ''
        run: |
          if [ -f "package.json" ]; then
            sed -i "s/\"version\": \".*\"/\"version\": \"${{ env.NEW_VERSION }}\"/g" package.json
          fi
          if [ -f "Cargo.toml" ]; then
            sed -i "s/^version = \".*\"/version = \"${{ env.NEW_VERSION }}\"/g" Cargo.toml
          fi

      - name: Create Release Branch and Push
        if: env.NEW_VERSION != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "ClayReleaseBot"
          git config --global user.email "claybot@internal"
          
          if [ -f "CHANGELOG.md" ]; then
            cat current_changelog.md CHANGELOG.md > temp_changelog.md && mv temp_changelog.md CHANGELOG.md
          else
            cp current_changelog.md CHANGELOG.md
          fi

          BRANCH_NAME="release/v${{ env.NEW_VERSION }}"
          git checkout -b "$BRANCH_NAME"

          [ -f "package.json" ] && git add package.json
          [ -f "Cargo.toml" ] && git add Cargo.toml
          [ -f "CHANGELOG.md" ] && git add CHANGELOG.md

          git commit -m "chore: prepare release ${{ env.NEW_VERSION }}" || echo "No changes to commit"
          
          # Force push biar branch rilis lama otomatis ke-repull/ke-update dengan commit main paling baru
          git push origin "$BRANCH_NAME" --force

          # Cek apakah PR untuk branch ini sudah pernah ada sebelumnya
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --json number -q '.[0].number')

          if [ -z "$PR_EXISTS" ]; then
            echo "Opening a brand new Release PR..."
            gh pr create \
              --title "chore: release ${{ env.NEW_VERSION }}" \
              --body-file current_changelog.md \
              --base main \
              --head "$BRANCH_NAME"
          else
            echo "PR already exists (ID: $PR_EXISTS). Auto-updating PR body description..."
            # FITUR BARU: Otomatis ngedit isi body deskripsi PR lama pake changelog yang barusan di-generate
            gh pr edit "$PR_EXISTS" --body-file current_changelog.md
          fi
