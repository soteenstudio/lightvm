name: Domloo Release Trigger

concurrency:
  group: domloo-release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  smart-release:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.comment != null && github.event.comment.user.login == 'claycuy')
    
    uses: domloorelease/action/.github/workflows/domloo-action.yml@main
    secrets: inherit
