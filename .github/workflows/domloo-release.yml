name: Domloo Release Trigger

concurrency:
  group: domloo-release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Domloo Release
        uses: domlooorgs/release-action@main # Manggil composite action lu
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Cukup parsing token default repo mereka
