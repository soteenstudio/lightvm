name: Domloo Release Trigger

concurrency:
  group: domloo-release-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  smart-release:
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.comment.user.login == 'claycuy')
    
    # LANGSUNG MANGGIL DI SINI (Gak perlu runs-on dan steps lagi)
    uses: domloorelease/action/.github/workflows/release-engine.yml@main
    
    # Biar secret di repo domloorelease/action otomatis kebaca otomatis
    secrets: inherit
