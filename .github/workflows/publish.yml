name: Build and Publish N-API
on:
  push:
    tags:
      - 'v*' # Jalan cuma pas lo bikin tag versi, misal v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release
        working-directory: rust

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          # Pake pattern ini biar dapet filenya mau apapun extension-nya
          path: |
            rust/target/release/*.node
            rust/target/release/*.dll
            rust/target/release/*.so
            rust/target/release/*.dylib

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate Scoped Packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          
          PLATFORMS=(
            "binary-ubuntu-latest|linux-x64|index.linux.node"
            "binary-windows-latest|win32-x64|index.win.node"
            "binary-macos-latest|darwin-x64|index.darwin.node"
          )

          for item in "${PLATFORMS[@]}"; do
            IFS="|" read -r ARTIFACT PLATFORM BIN_NAME <<< "$item"
            PKG_NAME="@lightvm/core-$PLATFORM"
            mkdir -p "publish/$PLATFORM"
            
            # Cari biner (mau itu .so, .dll, atau .dylib) lalu copy dan rename jadi BIN_NAME (.node)
            find "binaries/$ARTIFACT" -type f \( -name "*.node" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) -exec cp {} "publish/$PLATFORM/$BIN_NAME" \;
            
            # Cek apakah copy berhasil, biar gak zonk pas publish
            if [ ! -f "publish/$PLATFORM/$BIN_NAME" ]; then
              echo "Error: Biner untuk $PLATFORM tidak ditemukan di binaries/$ARTIFACT"
              exit 1
            fi

            cat <<EOF > "publish/$PLATFORM/package.json"
          {
            "name": "$PKG_NAME",
            "version": "$VERSION",
            "os": ["${PLATFORM%-*}"],
            "cpu": ["x64"],
            "main": "$BIN_NAME",
            "files": ["$BIN_NAME"]
          }
          EOF

            cd "publish/$PLATFORM"
            npm publish --access public --tag latest
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Finalize Main Package
        run: |
          # Update package.json utama buat pake optionalDependencies ke sub-package tadi
          # Biar pas user install 'lightvm', dia otomatis narik yang sesuai OS
          npm publish --access public --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
