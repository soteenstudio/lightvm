name: Build and Publish N-API
on:
  release:
    types: [published]
  
  workflow_run:
    workflows: ["Check Token Status"]
    types:
      - completed

jobs:
  build-npm:
    if: ${{ github.event_name == 'release' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # --- 64-BIT VARIANTS ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: aarch64-linux-android
            platform: android-arm64

          # --- ARM64 LINUX (NEW) ---
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            platform: linux-musl-arm64

          # --- 32-BIT VARIANTS ---
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            platform: linux-ia32
          - os: windows-latest
            target: i686-pc-windows-msvc
            platform: win32-ia32
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            platform: android-arm

          # --- LINUX MUSL (ALPINE) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-musl-x64
          - os: ubuntu-latest
            target: i686-unknown-linux-musl
            platform: linux-musl-ia32

          # --- BSD FAMILY ---
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x64

      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        if: |
          matrix.platform != 'linux-ia32' && 
          !contains(matrix.platform, 'musl') && 
          !contains(matrix.platform, 'arm64') &&
          matrix.platform != 'freebsd-x64'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Rust (Minimal for Cross/Specialized)
        if: |
          matrix.platform == 'freebsd-x64' || 
          contains(matrix.platform, 'musl') || 
          contains(matrix.platform, 'arm64') ||
          matrix.platform == 'linux-ia32'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup Android NDK
        if: contains(matrix.platform, 'android')
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          mkdir -p .cargo
          if [ "${{ matrix.platform }}" == "android-arm64" ]; then
            LINKER="aarch64-linux-android33-clang"
          else
            LINKER="armv7a-linux-androideabi33-clang"
          fi
          echo "[target.${{ matrix.target }}]" > .cargo/config.toml
          echo "ar = \"$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar\"" >> .cargo/config.toml
          echo "linker = \"$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$LINKER\"" >> .cargo/config.toml

      - name: Build Release (Standard)
        if: |
          matrix.platform == 'linux-x64' || 
          matrix.platform == 'win32-x64' || 
          matrix.platform == 'win32-ia32' || 
          matrix.platform == 'darwin-x64'
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: rust

      - name: Build Release (Specialized)
        if: |
          contains(matrix.platform, 'android') || 
          matrix.platform == 'freebsd-x64' || 
          contains(matrix.platform, 'musl') || 
          contains(matrix.platform, 'arm64') ||
          matrix.platform == 'linux-ia32'
        run: |
          if [[ "${{ matrix.platform }}" == *"android"* ]]; then
            cd rust && cargo build --release --target ${{ matrix.target }}
          elif [[ "${{ matrix.platform }}" == *"musl"* ]]; then
            if [ ! -f "./cross" ]; then
              curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
              chmod +x cross
            fi
            cd rust
            RUSTFLAGS="-C target-feature=-crt-static" ../cross build --release --target ${{ matrix.target }}
          else
            if [ ! -f "./cross" ]; then
              curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
              chmod +x cross
            fi
            cd rust
            ../cross build --release --target ${{ matrix.target }}
          fi
  
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            rust/target/${{ matrix.target }}/release/*.node
            rust/target/${{ matrix.target }}/release/*.dll
            rust/target/${{ matrix.target }}/release/*.so
            rust/target/${{ matrix.target }}/release/*.dylib

  publish-npm:
    needs: build-npm
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Build JavaScript Interface
        run: |
          npm install
          npm run build

      - name: Publish to NPM
        run: |
          RAW_VERSION="${{ github.event.release.tag_name }}"
          VERSION=${RAW_VERSION#v}
          TAG="latest"
          if [[ "$VERSION" =~ -(proto|alpha|beta|rc) ]]; then TAG="next"; fi
          
          PLATFORMS=(
            "binary-linux-x64|linux-x64|index.linux.node|x64"
            "binary-linux-arm64|linux-arm64|index.linux-arm64.node|arm64"
            "binary-linux-ia32|linux-ia32|index.linux32.node|ia32"
            "binary-win32-x64|win32-x64|index.win.node|x64"
            "binary-win32-ia32|win32-ia32|index.win32.node|ia32"
            "binary-darwin-x64|darwin-x64|index.darwin.node|x64"
            "binary-android-arm64|android-arm64|index.android.node|arm64"
            "binary-android-arm|android-arm|index.android32.node|arm"
            "binary-linux-musl-x64|linux-musl-x64|index.musl-x64.node|x64"
            "binary-linux-musl-arm64|linux-musl-arm64|index.musl-arm64.node|arm64"
            "binary-linux-musl-ia32|linux-musl-ia32|index.musl-ia32.node|ia32"
            "binary-freebsd-x64|freebsd-x64|index.freebsd.node|x64"
          )

          for item in "${PLATFORMS[@]}"; do
            IFS="|" read -r ARTIFACT PLATFORM BIN_NAME CPU <<< "$item"
            PKG_NAME="@lightvm/core-$PLATFORM"
            OS_VAL="${PLATFORM%-*}"
            mkdir -p "publish/$PLATFORM"
            find "binaries/$ARTIFACT" -type f \( -name "*.node" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) -exec cp {} "publish/$PLATFORM/$BIN_NAME" \;
            cp -f README.md "publish/$PLATFORM/" || true
            cp -f LICENSE "publish/$PLATFORM/" || true
            
            cat <<EOF > "publish/$PLATFORM/package.json"
          {
            "name": "$PKG_NAME",
            "version": "$VERSION",
            "os": ["$OS_VAL"],
            "cpu": ["$CPU"],
            "main": "$BIN_NAME",
            "files": ["$BIN_NAME", "README.md", "LICENSE"],
            "publishConfig": { "access": "public" },
            "license": "Apache-2.0"
          }
          EOF
            cd "publish/$PLATFORM"
            npm publish --tag $TAG --access public || echo "Skip existing"
            cd ../..
          done

          sudo apt-get install -y jq
          OP_DEPS=$(cat <<EOF
          {
            "@lightvm/core-linux-x64": "$VERSION",
            "@lightvm/core-linux-arm64": "$VERSION",
            "@lightvm/core-linux-ia32": "$VERSION",
            "@lightvm/core-win32-x64": "$VERSION",
            "@lightvm/core-win32-ia32": "$VERSION",
            "@lightvm/core-darwin-x64": "$VERSION",
            "@lightvm/core-android-arm64": "$VERSION",
            "@lightvm/core-android-arm": "$VERSION",
            "@lightvm/core-linux-musl-x64": "$VERSION",
            "@lightvm/core-linux-musl-arm64": "$VERSION",
            "@lightvm/core-linux-musl-ia32": "$VERSION",
            "@lightvm/core-freebsd-x64": "$VERSION"
          }
          EOF
          )

          jq --arg ver "$VERSION" --argjson deps "$OP_DEPS" \
            '.version = $ver | .optionalDependencies = $deps' \
            package.json > temp.json && mv temp.json package.json

          npm publish --access public --tag $TAG
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crates:
    needs: build-npm
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync Assets and Version
        run: |
          # 1. Ambil versi dari tag (buang prefix 'v' kalau ada)
          RAW_VERSION="${{ github.event.release.tag_name }}"
          VERSION=${RAW_VERSION#v}
          echo "Publishing version: $VERSION"

          # 2. Modif Cargo.toml pake sed (cari line yang mulai dengan 'version =')
          # Kita pake -i buat edit file langsung
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" rust/Cargo.toml

          # 3. Copy README & LICENSE
          cp README.md rust/
          cp LICENSE rust/

      - name: Publish to Crates.io
        # Wajib pake --allow-dirty karena Cargo.toml & README berubah statusnya
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty
        working-directory: rust
