name: Build and Publish N-API
on:
  push:
    tags:
      - 'v*' # Jalan cuma pas lo bikin tag versi, misal v1.0.0

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release
        working-directory: rust

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          # Pake pattern ini biar dapet filenya mau apapun extension-nya
          path: |
            rust/target/release/*.node
            rust/target/release/*.dll
            rust/target/release/*.so
            rust/target/release/*.dylib

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate Scoped Packages
        run: |
          # Ambil versi asli dari package.json utama
          VERSION=$(node -p "require('./package.json').version")
          
          # List platform yang mau dibuat
          # Format: folder_artifact | platform_name | binary_name
          PLATFORMS=(
            "binary-ubuntu-latest|linux-x64|index.linux.node"
            "binary-windows-latest|win32-x64|index.win.node"
            "binary-macos-latest|darwin-x64|index.darwin.node"
          )

          for item in "${PLATFORMS[@]}"; do
            IFS="|" read -r ARTIFACT PLATFORM BIN_NAME <<< "$item"
            
            PKG_NAME="@lightvm/core-$PLATFORM"
            mkdir -p "publish/$PLATFORM"
            
            # Copy binary ke folder publish
            cp "binaries/$ARTIFACT/"*.node "publish/$PLATFORM/$BIN_NAME"
            
            # Bikin package.json buat sub-package secara dinamis
            cat <<EOF > "publish/$PLATFORM/package.json"
          {
            "name": "$PKG_NAME",
            "version": "$VERSION",
            "os": ["${PLATFORM%-*}"],
            "cpu": ["x64"],
            "main": "$BIN_NAME",
            "files": ["$BIN_NAME"]
          }
          EOF

            # Publish sub-package
            cd "publish/$PLATFORM"
            npm publish --access public
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Finalize Main Package
        run: |
          # Update package.json utama buat pake optionalDependencies ke sub-package tadi
          # Biar pas user install 'lightvm', dia otomatis narik yang sesuai OS
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
