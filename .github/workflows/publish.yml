name: Build and Publish N-API

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Manual version override'
        required: false
        default: ''
  release:
    types: [published]

jobs:
  build-npm:
    runs-on: ${{ matrix.os }}
    env:
      ANDROID_NDK_LATEST_HOME: /usr/local/lib/android/sdk/ndk/27.0.11718014
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          # --- WASM FAMILY ---
          - os: ubuntu-latest
            target: wasm32-unknown-unknown
            platform: browser-wasm

          # --- 64-BIT VARIANTS ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: aarch64-linux-android
            platform: android-arm64

          # --- ARM64 LINUX (NEW) ---
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            platform: linux-musl-arm64

          # --- 32-BIT VARIANTS ---
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            platform: linux-ia32
          - os: windows-latest
            target: i686-pc-windows-msvc
            platform: win32-ia32
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            platform: android-arm

          # --- LINUX MUSL (ALPINE) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-musl-x64
          - os: ubuntu-latest
            target: i686-unknown-linux-musl
            platform: linux-musl-ia32

          # --- BSD FAMILY ---
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        if: |
          matrix.platform != 'linux-ia32' && 
          !contains(matrix.platform, 'musl') && 
          !contains(matrix.platform, 'arm64') &&
          matrix.platform != 'freebsd-x64'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Rust (Minimal for Cross/Specialized)
        if: |
          matrix.platform == 'freebsd-x64' || 
          contains(matrix.platform, 'musl') || 
          contains(matrix.platform, 'arm64') ||
          matrix.platform == 'linux-ia32'
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cargo-ndk
        if: contains(matrix.platform, 'android')
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        if: contains(matrix.platform, 'android')
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27

      - name: Build Release (Standard)
        if: |
          matrix.platform == 'linux-x64' || 
          matrix.platform == 'win32-x64' || 
          matrix.platform == 'win32-ia32' || 
          matrix.platform == 'darwin-x64'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install Linker
        if: |
          contains(matrix.platform, 'android') || 
          contains(matrix.platform, 'musl') || 
          contains(matrix.platform, 'arm64')
        run: sudo apt-get update && sudo apt-get install -y lld clang

      - name: Build Release (Specialized)
        if: |
          contains(matrix.platform, 'android') || 
          matrix.platform == 'freebsd-x64' || 
          contains(matrix.platform, 'musl') || 
          contains(matrix.platform, 'arm64') ||
          matrix.platform == 'linux-ia32'
        env:
          PLATFORM: ${{ matrix.platform }}
          TARGET: ${{ matrix.target }}
        run: bash .github/scripts/publish/build_release.sh
      - name: Build WASM
        if: matrix.platform == 'browser-wasm'
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      
          wasm-pack build \
            --target web \
            --release \
            -- --features wasm

      - name: Upload Artifacts
        if: matrix.platform != 'browser-wasm'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            target/${{ matrix.target }}/release/*.node
            target/${{ matrix.target }}/release/*.dll
            target/${{ matrix.target }}/release/*.so
            target/${{ matrix.target }}/release/*.dylib
            pkg/*

      - name: Upload WASM Artifacts
        if: matrix.platform == 'browser-wasm'
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: pkg/

  publish-npm:
    needs: build-npm
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Build JavaScript Interface
        run: |
          npm install
          npm run build

      - name: Publish to NPM
        run: bash .github/scripts/publish/publish_npm.sh
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Upload Test Tarballs (Only on Manual Run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages-test
          path: dist-test/
          retention-days: 3

  publish-crates:
    needs: build-npm
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync Assets and Version
        run: bash .github/scripts/publish/sync_assets_version.sh

      - name: Publish to Crates.io
        run: bash .github/scripts/publish/publish_crates.sh
