name: Build and Publish N-API
on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # --- 64-BIT VARIANTS ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: aarch64-linux-android
            platform: android-arm64

          # --- 32-BIT VARIANTS ---
          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            platform: linux-ia32
          - os: windows-latest
            target: i686-pc-windows-msvc
            platform: win32-ia32
          - os: ubuntu-latest
            target: armv7-linux-androideabi
            platform: android-arm
            
          # --- LINUX MUSL (ALPINE) ---
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-musl-x64
          - os: ubuntu-latest
            target: i686-unknown-linux-musl
            platform: linux-musl-ia32
            
          # --- FREEBSD (X64) ---
          - os: ubuntu-latest
            target: x86_64-unknown-freebsd
            platform: freebsd-x64

          # --- RISC-V ---
          - os: ubuntu-latest
            target: riscv64gc-unknown-linux-gnu
            platform: linux-riscv64
          - os: ubuntu-latest
            target: riscv32gc-unknown-linux-gnu
            platform: linux-riscv32

      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        # Tambahin kondisi biar dia skip FreeBSD dan RISC-V di step rustup
        if: |
          matrix.platform != 'linux-ia32' && 
          !contains(matrix.platform, 'musl') && 
          !contains(matrix.platform, 'freebsd') && 
          !contains(matrix.platform, 'riscv')
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          # Karena lo pake workspace 'rust', kasih tau path-nya
          workspaces: "rust -> target"
          # Tambahin matrix target biar cache-nya gak bentrok antar OS
          key: ${{ matrix.target }}
          

      # Handle Android NDK buat arm64 dan armv7
      - name: Setup Android NDK
        if: contains(matrix.platform, 'android')
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          mkdir -p .cargo
          # Dinamis tentukan linker berdasarkan platform
          if [ "${{ matrix.platform }}" == "android-arm64" ]; then
            LINKER="aarch64-linux-android33-clang"
          else
            LINKER="armv7a-linux-androideabi33-clang"
          fi
          echo "[target.${{ matrix.target }}]" > .cargo/config.toml
          echo "ar = \"$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar\"" >> .cargo/config.toml
          echo "linker = \"$ANDROID_NDK_LATEST_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/$LINKER\"" >> .cargo/config.toml

      - name: Build Release (Standard & Android)
        if: matrix.platform != 'linux-ia32' && !contains(matrix.platform, 'musl')
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: rust

      - name: Build Release (Docker - Multi Arch)
        # Tambahin FreeBSD dan RISC-V ke kondisi IF
        if: |
          matrix.platform == 'linux-ia32' || 
          contains(matrix.platform, 'musl') || 
          contains(matrix.platform, 'freebsd') || 
          contains(matrix.platform, 'riscv')
        run: |
          # 1. Download & setup cross (pake cache logic yang kita bahas tadi lebih oke)
          if [ ! -f "./cross" ]; then
            curl -L https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-musl.tar.gz | tar xz
            chmod +x cross
          fi
          
          # 2. Setup QEMU (Wajib buat RISC-V biar bisa emulasi)
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
          
          # 3. Build
          cd rust
          # Khusus FreeBSD biasanya butuh custom environment atau image, 
          # tapi cross-rs default udah cukup solid.
          RUSTFLAGS="-C target-feature=-crt-static" ../cross build --release --target ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            rust/target/${{ matrix.target }}/release/*.node
            rust/target/${{ matrix.target }}/release/*.dll
            rust/target/${{ matrix.target }}/release/*.so
            rust/target/${{ matrix.target }}/release/*.dylib

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Build JavaScript Interface
        run: |
          npm install
          npm run build

      - name: Publish to NPM
        run: |
          # AMBIL VERSI DARI TAG (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Publishing version: $VERSION"

          # --- LOGIC AUTO TAG ---
          # Default-nya kita set ke latest
          TAG="latest"

          # Cek apakah ada embel-embel prerelease
          # Regex ini nyari kata -proto, -alpha, atau -beta
          if [[ "$VERSION" =~ -(proto|alpha|beta) ]]; then
            TAG="next"
          fi

          # Kalau ada kata -release, kita paksa balik ke latest (opsional)
          if [[ "$VERSION" == *"-release"* ]]; then
            TAG="latest"
          fi

          echo "Detected Tag: $TAG"
          # ----------------------

          PLATFORMS=(
            "binary-linux-x64|linux-x64|index.linux.node|x64"
            "binary-linux-ia32|linux-ia32|index.linux32.node|ia32"
            "binary-win32-x64|win32-x64|index.win.node|x64"
            "binary-win32-ia32|win32-ia32|index.win32.node|ia32"
            "binary-darwin-x64|darwin-x64|index.darwin.node|x64"
            "binary-android-arm64|android-arm64|index.android.node|arm64"
            "binary-android-arm|android-arm|index.android32.node|arm"
            "binary-linux-musl-x64|linux-musl-x64|index.musl-x64.node|x64"
            "binary-linux-musl-ia32|linux-musl-ia32|index.musl-ia32.node|ia32",
            "binary-freebsd-x64|freebsd-x64|index.freebsd.node|x64"
            "binary-linux-riscv64|linux-riscv64|index.riscv64.node|riscv64"
            "binary-linux-riscv32|linux-riscv32|index.riscv32.node|riscv32"
          )

          for item in "${PLATFORMS[@]}"; do
            IFS="|" read -r ARTIFACT PLATFORM BIN_NAME CPU <<< "$item"
            PKG_NAME="@lightvm/core-$PLATFORM"
            OS_VAL="${PLATFORM%-*}"
            
            mkdir -p "publish/$PLATFORM"
            
            # Cari biner
            find "binaries/$ARTIFACT" -type f \( -name "*.node" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) -exec cp {} "publish/$PLATFORM/$BIN_NAME" \;
            
            # Paksa copy README & LICENSE (pake -f biar galak)
            cp -f README.md "publish/$PLATFORM/" || echo "Skip README"
            cp -f LICENSE "publish/$PLATFORM/" || echo "Skip LICENSE"
            
            # Generate package.json sub-package
            cat <<EOF > "publish/$PLATFORM/package.json"
          {
            "name": "$PKG_NAME",
            "version": "$VERSION",
            "os": ["$OS_VAL"],
            "cpu": ["$CPU"],
            "main": "$BIN_NAME",
            "files": ["$BIN_NAME", "README.md", "LICENSE"],
            "publishConfig": { "access": "public" },
            "license": "Apache-2.0"
          }
          EOF

            cd "publish/$PLATFORM"
            # Pake variabel $TAG hasil deteksi otomatis
            npm publish --tag $TAG --access public || echo "Skip existing version"
            cd ../..
          done

          # 1. Install jq (kalo belum ada di runner)
          sudo apt-get install -y jq

          # 2. Update Versi & Suntik optionalDependencies ke package.json utama
          # Kita bikin object opDeps dari daftar platform yang baru aja di-publish
          OP_DEPS=$(cat <<EOF
          {
            "@lightvm/core-linux-x64": "$VERSION",
            "@lightvm/core-linux-ia32": "$VERSION",
            "@lightvm/core-win32-x64": "$VERSION",
            "@lightvm/core-win32-ia32": "$VERSION",
            "@lightvm/core-darwin-x64": "$VERSION",
            "@lightvm/core-android-arm64": "$VERSION",
            "@lightvm/core-android-arm": "$VERSION",
            "@lightvm/core-linux-musl-x64": "$VERSION",
            "@lightvm/core-linux-musl-ia32": "$VERSION",
            "@lightvm/core-freebsd-x64": "$VERSION",
            "@lightvm/core-linux-riscv64": "$VERSION",
            "@lightvm/core-linux-riscv32": "$VERSION"
          }
          EOF
          )

          # Pake jq buat update version DAN gabungin optionalDependencies
          jq --arg ver "$VERSION" --argjson deps "$OP_DEPS" \
            '.version = $ver | .optionalDependencies = $deps' \
            package.json > temp.json && mv temp.json package.json

          # 3. Publish package utama pake $TAG yang sama
          # Ini bakal upload package.json yang udah "kotor" tadi ke NPM
          echo "Publishing main package with injected optionalDependencies..."
          npm publish --access public --tag $TAG

        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
