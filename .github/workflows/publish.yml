name: Build and Publish N-API
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Tambahin target triplet buat mapping yang jelas
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
          - os: ubuntu-latest
            target: aarch64-linux-android
            platform: android-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Khusus Android, kita butuh NDK linker
      - name: Setup Android NDK
        if: matrix.platform == 'android-arm64'
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME" >> $GITHUB_ENV
          # Setup linker buat rust biar tau pake clang punya NDK
          mkdir -p .cargo
          echo '[target.aarch64-linux-android]' > .cargo/config.toml
          echo 'ar = "'$ANDROID_NDK_LATEST_HOME'/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar"' >> .cargo/config.toml
          echo 'linker = "'$ANDROID_NDK_LATEST_HOME'/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android33-clang"' >> .cargo/config.toml

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: rust

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            rust/target/${{ matrix.target }}/release/*.node
            rust/target/${{ matrix.target }}/release/*.dll
            rust/target/${{ matrix.target }}/release/*.so
            rust/target/${{ matrix.target }}/release/*.dylib

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to NPM
        run: |
          # AMBIL VERSI DARI TAG (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Publishing version: $VERSION"

          PLATFORMS=(
            "binary-linux-x64|linux-x64|index.linux.node|x64"
            "binary-win32-x64|win32-x64|index.win.node|x64"
            "binary-darwin-x64|darwin-x64|index.darwin.node|x64"
            "binary-android-arm64|android-arm64|index.android.node|arm64"
          )

          for item in "${PLATFORMS[@]}"; do
            IFS="|" read -r ARTIFACT PLATFORM BIN_NAME CPU <<< "$item"
            PKG_NAME="@lightvm/core-$PLATFORM"
            OS_VAL="${PLATFORM%-*}"
            
            mkdir -p "publish/$PLATFORM"
            
            # Cari biner di folder artifact (path rekursif karena upload-artifact v4 rada beda struktur foldernya)
            find "binaries/$ARTIFACT" -type f \( -name "*.node" -o -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) -exec cp {} "publish/$PLATFORM/$BIN_NAME" \;
            
            # Generate package.json sub-package dengan versi dari TAG
            cat <<EOF > "publish/$PLATFORM/package.json"
          {
            "name": "$PKG_NAME",
            "version": "$VERSION",
            "os": ["$OS_VAL"],
            "cpu": ["$CPU"],
            "main": "$BIN_NAME",
            "files": ["$BIN_NAME"],
            "publishConfig": { "access": "public" }
          }
          EOF

            cd "publish/$PLATFORM"
            npm publish || echo "Skip existing version"
            cd ../..
          done

          # Update & Publish main package
          # Kita pake jq buat inject versi tag ke package.json utama sebelum publish
          sudo apt-get install jq
          jq ".version = \"$VERSION\"" package.json > temp.json && mv temp.json package.json
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
